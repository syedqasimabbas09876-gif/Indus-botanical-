<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indus Botanical | Global Organic Export</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root { --primary-green: #2d5a27; --gold: #c5a059; }
body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fdfdfd; scroll-behavior: smooth; }

.top-nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary-green); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.nav-links a { text-decoration: none; color: #333; margin-right: 25px; font-weight: bold; }
.login-btn { background: var(--primary-green); color: white !important; padding: 10px 25px; border-radius: 50px; text-decoration: none; }

.hero { height: 40vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }

.container { padding: 40px 8%; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
.card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; position: relative; overflow: hidden; }
.card::before { content: "SAVE $5"; position: absolute; top: 10px; left: -30px; background: var(--gold); color: white; padding: 5px 40px; transform: rotate(-45deg); font-size: 0.7rem; }
.card img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; }

.calc-area { background: #f4f9f4; padding: 15px; border-radius: 12px; margin: 15px 0; }
.total-price { font-size: 1.5rem; font-weight: bold; color: #222; }
input[type="number"] { width: 60px; padding: 8px; border-radius: 5px; border: 1px solid #ddd; text-align: center; }

.form-box { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.form-box input, .form-box textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 8px; }

.sticky-controls { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
.icon-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.insta { background: #E1306C; } .whatsapp { background: #25D366; } .ai { background: #1a1a1a; border: 2px solid var(--primary-green); }

.pulse { animation: pulse-green 2s infinite; }
@keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(45, 90, 39, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(45, 90, 39, 0); } 100% { box-shadow: 0 0 0 0 rgba(45, 90, 39, 0); } }

#ai-chat-box { display:none; position:fixed; right:20px; bottom:90px; width:300px; background:white; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:2000; overflow:hidden; border: 1px solid var(--primary-green); }
footer { background: #111; color: white; padding: 30px; text-align: center; }
</style>
</head>
<body>

<nav class="top-nav">
<div><b style="color: var(--primary-green);">INDUS BOTANICAL</b></div>
<div class="nav-links">
<a href="#">Home</a>
<a href="#order">Get Quote</a>
<a href="#" class="login-btn">Login</a>
</div>
</nav>

<header class="hero">
<h1>Organic Export Hub</h1>
</header>

<div class="container">
<div class="product-grid">
<div class="card">
<img src="neem_powder.jpg" alt="Neem Powder">
<h3>Neem Powder</h3>
<div class="calc-area">
<div style="font-weight: bold;">$19.99/KG</div>
QTY: <input type="number" id="p_qty" value="1" min="1" oninput="updatePrice()">
<div class="total-price">$<span id="p_total">19.99</span></div>
</div>
</div>
<div class="card">
<img src="neem_leaves.jpg" alt="Dry Leaves">
<h3>Dry Neem Leaves</h3>
<div class="calc-area">
<div style="font-weight: bold;">$14.50/KG</div>
QTY: <input type="number" id="l_qty" value="1" min="1" oninput="updatePrice()">
<div class="total-price">$<span id="l_total">14.50</span></div>
</div>
</div>
</div>
</div>

<section id="order" class="form-box">
<h2 style="text-align:center;">Export Inquiry</h2>
<form action="https://formspree.io/f/indusbotanical.global@gmail.com" method="POST">
<input type="text" name="Name" placeholder="Full Name" required>
<input type="email" name="Email" placeholder="Email" required>
<input type="text" name="Country" placeholder="Country" required>
<textarea name="Address" placeholder="Shipping Address" rows="3" required></textarea>
<p style="font-size:0.8rem; color:red;">* Samples are non-returnable. Recipient pays shipping.</p>
<button type="submit" class="login-btn" style="width:100%; border:none; cursor:pointer;">Submit to Gmail</button>
</form>
</section>

<div id="ai-chat-box">
<div style="background:var(--primary-green); color:white; padding:10px; display:flex; justify-content:space-between;">
<span>Indus AI Agent</span>
<span onclick="toggleAIChat()" style="cursor:pointer;">&times;</span>
</div>
<div id="ai-content" style="padding:10px; height:200px; overflow-y:auto; font-size:0.9rem; background:#f9f9f9;">
Hello! How can I help you today?
</div>
<div style="padding:5px; border-top:1px solid #eee; display:flex; gap:5px; flex-wrap:wrap;">
<button onclick="aiReply('price')" style="font-size:0.7rem; cursor:pointer;">Rates?</button>
<button onclick="aiReply('sample')" style="font-size:0.7rem; cursor:pointer;">Sample?</button>
</div>
</div>

<div class="sticky-controls">
<a href="https://wa.me/923299718034" class="icon-btn whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>
<a href="javascript:void(0)" class="icon-btn ai pulse" onclick="toggleAIChat()"><i class="fas fa-microchip"></i></a>
</div>

<footer><p>indusbotanical.global@gmail.com</p></footer>

<script>
function updatePrice() {
let qP = document.getElementById('p_qty').value;
let qL = document.getElementById('l_qty').value;
document.getElementById('p_total').innerText = (qP * 19.99).toFixed(2);
document.getElementById('l_total').innerText = (qL * 14.50).toFixed(2);
}
function toggleAIChat() {
let box = document.getElementById('ai-chat-box');
box.style.display = (box.style.display === 'none') ? 'block' : 'none';
}
function aiReply(type) {
let content = document.getElementById('ai-content');
content.innerHTML += "<p style='color:#888;'>AI is thinking...</p>";
setTimeout(() => {
content.lastChild.remove();
if(type==='price') content.innerHTML += "<p><b>AI:</b> Powder is $19.99, Leaves $14.50.</p>";
if(type==='sample') content.innerHTML += "<p><b>AI:</b> 100g sample is free, shipping applies.</p>";
content.scrollTop = content.scrollTop + 100;
}, 1000);
}
</script>
</body>
</html>
