<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indus Botanical | Global Organic Export</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --primary: #2d5a27; --gold: #c5a059; --text: #333; --light: #f9fbf9; }
body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; scroll-behavior: smooth; }

/* Navigation */
.top-nav { background: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.logo img { height: 70px; width: 70px; border-radius: 50%; object-fit: cover; display: block; border: 2px solid var(--gold); }
.nav-links { display: flex; gap: 20px; font-weight: bold; }
.nav-links a { text-decoration: none; color: var(--text); }

/* Pulse Effect for AI (As per your screenshot 1402) */
.pulse-effect { animation: ai-glow 2s infinite; border: 2px solid var(--primary); border-radius: 50%; }
@keyframes ai-glow {
0% { box-shadow: 0 0 0 0 rgba(45, 90, 39, 0.4); }
70% { box-shadow: 0 0 0 15px rgba(45, 90, 39, 0); }
100% { box-shadow: 0 0 0 0 rgba(45, 90, 39, 0); }
}

/* Products Section */
.container { padding: 40px 5%; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
.card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 35px rgba(0,0,0,0.08); text-align: center; border: 1px solid #eee; transition: 0.3s; }
.card img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; }

/* Form & Buttons */
.form-section { background: var(--light); padding: 70px 5%; }
.form-container { max-width: 800px; margin: 0 auto; background: white; padding: 50px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
.input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
input, textarea { width: 100%; padding: 18px; border: 2px solid #eee; border-radius: 12px; }
.buy-btn { background: var(--primary); color: white; padding: 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; }

/* Floating Controls */
.sticky-controls { position: fixed; right: 25px; bottom: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
.icon-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white !important; font-size: 30px; text-decoration: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
.insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.whatsapp { background: #25D366; }
</style>
</head>
<body>

<nav class="top-nav">
<div class="logo">
<img src="https://i.ibb.co/LqYhH5t/1349.jpg" alt="Indus Botanical Logo">
</div>
<div class="nav-links">
<a href="#products">Store</a>
<a href="#order">Inquiry</a>
</div>
</nav>

<section class="container" id="products">
<div class="product-grid">
<div class="card">
<img src="https://i.ibb.co/nqNCh9p1/1448.jpg" alt="Neem Powder">
<h3>Neem Powder</h3>
<div class="calc-box">
<input type="number" id="q1" value="1" oninput="calc()">
<div class="total-price">Total: $<span id="t1">19.99</span></div>
</div>
<a href="#order" class="buy-btn" style="text-decoration:none; display:block;">Inquiry Now</a>
</div>

<div class="card">
<img src="https://i.ibb.co/DDLv6p9F/1378.jpg" alt="Dry Leaves">
<h3>Dry Neem Leaves</h3>
<div class="calc-box">
<input type="number" id="q2" value="1" oninput="calc()">
<div class="total-price">Total: $<span id="t2">14.50</span></div>
</div>
<a href="#order" class="buy-btn" style="text-decoration:none; display:block;">Inquiry Now</a>
</div>
</div>
</section>

<section class="form-section" id="order">
<div class="form-container">
<h2 style="text-align: center; color: var(--primary);">Global wholesale Inquiry</h2>
<form action="https://formspree.io/f/indusbotanical.global@gmail.com" method="POST">
<div class="input-group">
<input type="text" name="First Name" placeholder="First Name" required>
<input type="text" name="Last Name" placeholder="Last Name" required>
</div>
<div class="input-group">
<input type="email" name="Email" placeholder="Email Address" required>
<input type="tel" name="Phone" placeholder="Phone Number" required>
</div>
<textarea name="Details" placeholder="Order Details..." rows="5" required></textarea>
<button type="submit" class="buy-btn">SUBMIT REQUEST</button>
</form>
</div>
</section>

<div class="sticky-controls">
<a href="https://www.instagram.com/Indus_botanical.global" class="icon-btn insta" target="_blank">
<i class="fab fa-instagram"></i>
</a>
<a href="https://wa.me/923299718034" class="icon-btn whatsapp" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>
</div>

<script>
function calc() {
let q1 = document.getElementById('q1').value;
let q2 = document.getElementById('q2').value;
document.getElementById('t1').innerText = (q1 * 19.99).toFixed(2);
document.getElementById('t2').innerText = (q2 * 14.50).toFixed(2);
}
</script>

</body>
</html>
